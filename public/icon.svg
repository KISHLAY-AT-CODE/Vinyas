<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients, shadows, and filters -->
  <defs>
    <!-- Background Canvas Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Outer Border Glow Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#ef4444" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6" />
    </linearGradient>

    <!-- Logo Left Stem Gradient (Orange-Gold Energy) -->
    <linearGradient id="left-stem-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>

    <!-- Logo Right Ribbon 1 Gradient (Red-Orange Ascent) -->
    <linearGradient id="right-rib1-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Logo Right Ribbon 2 Gradient (Pink-Red Spark) -->
    <linearGradient id="right-rib2-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Dynamic Radial Background Glow -->
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow for Float Effect -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Core Logo Glow -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Canvas Background (App Icon Style) -->
  <rect width="496" height="496" x="8" y="8" rx="248" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="4" />

  <!-- Radial Background Lighting Overlay -->
  <circle cx="256" cy="256" r="230" fill="url(#radial-glow)" />

  <!-- The Icon Group (Centered and Floating) -->
  <g filter="url(#drop-shadow)" transform="translate(12, -4)">
    
    <!-- Outer Orbit Circle (Subtle Tech Grid Component) -->
    <circle cx="244" cy="260" r="148" fill="none" stroke="#334155" stroke-dasharray="8 12" stroke-width="1.5" stroke-opacity="0.4" />
    
    <!-- Left Pillar of V: Represents solid foundation, tracking, strength -->
    <path d="M 172,130 
             C 172,130 186,190 216,285 
             C 222,305 235,340 244,360
             C 246,364 250,364 252,360
             C 255,354 262,330 268,310
             L 220,170
             C 214,152 196,130 172,130 Z" 
          fill="url(#left-stem-grad)" 
          filter="url(#logo-glow)" />

    <!-- Ribbon 1 (Lower Right Ascending Progress Track) -->
    <path d="M 234,324 
             C 252,310 290,265 315,225 
             C 328,205 332,192 332,184
             C 332,176 324,170 316,170
             C 304,170 290,188 274,212
             L 242,260
             Z" 
          fill="url(#right-rib1-grad)" />

    <!-- Ribbon 2 (Higher Right Ascending - Represents peak achievements & goals) -->
    <path d="M 264,260 
             C 288,230 330,172 356,134 
             C 368,116 374,104 374,96
             C 374,86 364,80 354,80
             C 342,80 326,98 308,124
             L 272,178
             Z" 
          fill="url(#right-rib2-grad)" />

    <!-- Glowing Apex/Star of Success (Golden Spark at the target destination) -->
    <g transform="translate(366, 88)">
      <!-- Outer Pulsing Glow -->
      <circle cx="0" cy="0" r="16" fill="#facc15" opacity="0.3" filter="url(#logo-glow)" />
      <!-- Star Shape -->
      <path d="M 0,-8 L 2.5,-2.5 L 8,0 L 2.5,2.5 L 0,8 L -2.5,2.5 L -8,0 L -2.5,-2.5 Z" fill="#fef08a" />
    </g>

    <!-- Speed Lines / Tracking Accents (Left side kinetic indicators) -->
    <line x1="140" y1="180" x2="160" y2="180" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6" />
    <line x1="148" y1="210" x2="162" y2="210" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6" />
    <line x1="162" y1="240" x2="172" y2="240" stroke="#dc2626" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6" />
  </g>
</svg>
